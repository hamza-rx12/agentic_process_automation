services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.95"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [rpa]

  listener:
    build: ./services/listener
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      ALERTS_HTTP_PORT: "9000"
    ports:
      - "9000:9000"
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
    networks: [rpa]

  browser-agent:
    build: ./services/browser-agent
    env_file: .env
    environment:
      PORT: "8080"
      HOST_OVERRIDE: "browser-agent"
      AGENT_NAME: "browser-agent"
      AGENT_DESCRIPTION: "Executes web browsing tasks using Playwright."
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: "INFO"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks: [rpa]

  monitor-agent:
    build: ./services/monitor-agent
    env_file: .env
    environment:
      PORT: "8081"
      HOST_OVERRIDE: "monitor-agent"
      AGENT_NAME: "monitor-agent"
      AGENT_DESCRIPTION: "Observability agent: queries logs/metrics and creates dashboards."
      GRAFANA_URL: http://grafana:3000
      GRAFANA_API_KEY: ""
      LOG_LEVEL: "INFO"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      grafana: { condition: service_started }
    restart: unless-stopped
    networks: [rpa]

  orchestrator:
    build: ./services/orchestrator
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      BROWSER_AGENT_URL: http://browser-agent:8080
      MONITOR_AGENT_URL: http://monitor-agent:8081
      AGENT_NAME: "orchestrator"
      AGENT_DESCRIPTION: "Email-driven orchestrator that dispatches browser and monitor tasks."
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:      { condition: service_healthy }
      browser-agent: { condition: service_healthy }
      monitor-agent: { condition: service_healthy }
    restart: unless-stopped
    networks: [rpa]

  # ── Observability stack ──

  prometheus:
    image: prom/prometheus:v3.3.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [rpa]

  loki:
    image: grafana/loki:3.4
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [rpa]

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on: [loki]
    networks: [rpa]

  grafana:
    image: grafana/grafana:11.6
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [loki, prometheus]
    networks: [rpa]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8088:8080"
    networks: [rpa]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks: [rpa]

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  alertmanager-data:
  alloy-data:

networks:
  rpa:
    driver: bridge
