services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.95"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [rpa]

  listener:
    build: ./services/listener
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
    networks: [rpa]

  browser-agent:
    build: ./services/browser-agent
    env_file: .env
    environment:
      PORT: "8080"
      HOST_OVERRIDE: "browser-agent"
      AGENT_NAME: "browser-agent"
      AGENT_DESCRIPTION: "Executes web browsing tasks using Playwright."
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: "INFO"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks: [rpa]

  orchestrator:
    build: ./services/orchestrator
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      BROWSER_AGENT_URL: http://browser-agent:8080
      AGENT_NAME: "orchestrator"
      AGENT_DESCRIPTION: "Email-driven orchestrator that dispatches browser tasks."
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq: { condition: service_healthy }
      browser-agent: { condition: service_healthy }
    restart: unless-stopped
    networks: [rpa]

networks:
  rpa:
    driver: bridge
