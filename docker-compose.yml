name: apa

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apa
      POSTGRES_USER: apa
      POSTGRES_PASSWORD: apa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apa -d apa"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [apa]

  migrate:
    image: apa-migrate:latest
    build: ./services/migrate
    environment:
      DATABASE_URL: postgresql://apa:apa@postgres/apa
    depends_on:
      postgres: { condition: service_healthy }
    networks: [apa]

  listener:
    image: apa-listener:latest
    build: ./services/listener
    env_file: .env
    environment:
      DATABASE_URL: postgresql://apa:apa@postgres/apa
      ALERTS_HTTP_PORT: "9000"
    ports:
      - "9000:9000"
    depends_on:
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [apa]

  browser-agent:
    image: apa-browser-agent:latest
    build: ./services/browser-agent
    env_file: .env
    environment:
      PORT: "8080"
      HOST_OVERRIDE: "browser-agent"
      AGENT_NAME: "browser-agent"
      AGENT_DESCRIPTION: "Executes web browsing tasks using Playwright."
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: "INFO"
      DATABASE_URL: postgresql://apa:apa@postgres/apa
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [apa]

  monitor-agent:
    image: apa-monitor-agent:latest
    build: ./services/monitor-agent
    env_file: .env
    environment:
      PORT: "8081"
      HOST_OVERRIDE: "monitor-agent"
      AGENT_NAME: "monitor-agent"
      AGENT_DESCRIPTION: "Observability agent: queries logs/metrics and creates dashboards."
      GRAFANA_URL: http://grafana:3000
      GRAFANA_API_KEY: ""
      LOG_LEVEL: "INFO"
      DATABASE_URL: postgresql://apa:apa@postgres/apa
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      grafana: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [apa]

  orchestrator:
    image: apa-orchestrator:latest
    build: ./services/orchestrator
    env_file: .env
    environment:
      DATABASE_URL: postgresql://apa:apa@postgres/apa
      BROWSER_AGENT_URL: http://browser-agent:8080
      MONITOR_AGENT_URL: http://monitor-agent:8081
      AGENT_NAME: "orchestrator"
      AGENT_DESCRIPTION: "Email-driven orchestrator that dispatches browser and monitor tasks."
      LOG_LEVEL: "INFO"
    depends_on:
      migrate:       { condition: service_completed_successfully }
      browser-agent: { condition: service_healthy }
      monitor-agent: { condition: service_healthy }
    restart: unless-stopped
    networks: [apa]

  # ── Observability stack ──

  prometheus:
    image: prom/prometheus:v3.3.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [apa]

  loki:
    image: grafana/loki:3.4
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [apa]

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on: [loki]
    networks: [apa]

  grafana:
    image: grafana/grafana:11.6
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [loki, prometheus]
    networks: [apa]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8088:8080"
    networks: [apa]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks: [apa]

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  grafana-data:
  alertmanager-data:
  alloy-data:

networks:
  apa:
    driver: bridge
