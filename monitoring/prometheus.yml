global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: browser-agent
    static_configs:
      - targets: ["browser-agent:8080"]
    metrics_path: /metrics

  # monitor-agent /metrics deferred to a later phase
  # - job_name: monitor-agent
  #   static_configs:
  #     - targets: ["monitor-agent:8081"]
  #   metrics_path: /metrics
