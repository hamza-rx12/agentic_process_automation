global:
  resolve_timeout: 5m

route:
  group_by: [alertname, service]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: default
  routes:
    # Guard #1: drop any alert created by the monitor-agent to prevent loops.
    - matchers:
        - created_by = monitor-agent
      receiver: null
      continue: false

receivers:
  - name: default
    webhook_configs:
      - url: http://listener:9000/alerts
        send_resolved: false

  - name: null

inhibit_rules: []
