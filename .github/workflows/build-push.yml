name: Build & Push Images

on:
  push:
    branches: [main, master]
    paths:
      - "services/**"
      - ".github/workflows/build-push.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [listener, orchestrator, browser-agent, monitor-agent, migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/apa-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/apa-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/apa-${{ matrix.service }}:cache,mode=max

  update-values:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update imageTag in values.yaml
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/^imageTag: .*/imageTag: \"${SHA}\"/" k8s/charts/apa/values.yaml

      - name: Commit updated imageTag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/charts/apa/values.yaml
          git diff --cached --quiet || git commit -m "chore(deploy): bump imageTag to ${SHA}"
          git push
