# kind cluster config for the apa repo (APA stack).
#
# Usage:
#   kind create cluster --name apa --config k8s/kind-config.yaml
#   kind delete cluster --name apa
#
# Layout: 1 control-plane + 2 workers — enough to exercise pod anti-affinity
# for RabbitMQ quorum queues and Postgres replicas without over-committing.
#
# extraPortMappings on the control-plane node expose a handful of service
# ports on the host (via NodePort or an ingress controller) so you can hit
# Grafana / RabbitMQ management / the listener alerts webhook from your
# browser without `kubectl port-forward` every time.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: apa

# Pin the node image so clusters are reproducible across machines.
# Bump this when you want a newer Kubernetes.
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    kubeadmConfigPatches:
      # Label the control-plane so an ingress controller deployment can
      # nodeSelect onto it (standard nginx-ingress + kind pattern).
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # nginx-ingress will listen on these once installed; until then they
      # just sit idle. Mapping them up front avoids recreating the cluster
      # later to add ports.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

      # Direct NodePort access for the handful of services you'll hit by
      # hand during development. Keeping these lets you bypass ingress
      # while iterating.
      - containerPort: 30300   # grafana
        hostPort: 3000
        protocol: TCP
      - containerPort: 30900   # prometheus
        hostPort: 9090
        protocol: TCP
      - containerPort: 31567   # rabbitmq management UI
        hostPort: 15672
        protocol: TCP
      - containerPort: 30093   # alertmanager
        hostPort: 9093
        protocol: TCP
      - containerPort: 30000   # listener /alerts webhook
        hostPort: 9000
        protocol: TCP

  - role: worker
    image: kindest/node:v1.31.0
  - role: worker
    image: kindest/node:v1.31.0

# Cluster-wide feature gates / networking knobs can go here later.
# Leaving defaults for now — kind's defaults match upstream Kubernetes.
