# kube-prometheus-stack values tuned for kind (dev)
# Trims replicas, disables persistence, exposes NodePorts matching kind-config.yaml.

# Admission webhooks validate PrometheusRule / ServiceMonitor CRDs.
# Disabled in kind because the chart's cert-generation Jobs + webhook configs
# use Helm hook annotations that ArgoCD reinterprets as temporary hooks,
# causing the webhook configs to be deleted and the patch Job to loop forever.
# Safe to drop in dev; re-enable (with cert-manager) for real deployments.
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  # Disabling admission webhooks removes the cert Secret the operator
  # would otherwise mount for its HTTPS endpoint. Switch the operator to
  # plaintext HTTP so it doesn't try to mount a non-existent secret.
  tls:
    enabled: false

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi
  service:
    type: NodePort
    nodePort: 30900

grafana:
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30300

alertmanager:
  alertmanagerSpec:
    replicas: 1
    retention: 6h
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
  service:
    type: NodePort
    nodePort: 30093
