# Grafana Alloy values (log collector DaemonSet).
# Discovers pods in the `apa` namespace, tails their container logs from
# /var/log/pods, and pushes them to Loki with labels the dashboards expect.

alloy:
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 256Mi

  # Mount the node's /var/log so we can tail container logs.
  mounts:
    varlog: true

  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        // Only collect from the apa namespace.
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "keep"
          regex         = "apa"
        }

        // Standard k8s labels.
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        // Dashboards query on `service` and `project`.
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "service"
        }
        rule {
          target_label = "project"
          replacement  = "apa"
        }

        // Point the file tailer at the right log path on the node.
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          replacement   = "/var/log/pods/*$1/*.log"
          target_label  = "__path__"
        }
      }

      local.file_match "pods" {
        path_targets = discovery.relabel.pods.output
      }

      loki.source.file "pods" {
        targets    = local.file_match.pods.targets
        forward_to = [loki.process.pods.receiver]
      }

      // Strip the CRI timestamp/stream prefix from each line.
      loki.process "pods" {
        forward_to = [loki.write.default.receiver]
        stage.cri {}
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.apa.svc.cluster.local/loki/api/v1/push"
        }
      }
