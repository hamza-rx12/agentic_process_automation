apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate
  annotations:
    helm.sh/hook: pre-upgrade,pre-install
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-5"
  labels:
    {{- include "apa.labels" . | nindent 4 }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        {{- include "apa.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.migrate.image }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          # Argo fires this hook in the same sync wave as the CNPG cluster
          # bootstrap, so on a cold cluster the DB may briefly refuse
          # connections. Retry a handful of times before giving up.
          command: ["sh", "-c"]
          args:
            - |
              for i in $(seq 1 30); do
                if alembic upgrade head; then
                  exit 0
                fi
                echo "alembic upgrade failed (attempt $i/30) — retrying in 5s"
                sleep 5
              done
              echo "alembic upgrade head failed after 30 attempts"
              exit 1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName }}
                  key: uri
