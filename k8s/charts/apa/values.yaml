# Default values for the apa chart.
# Infrastructure (rabbitmq, postgres, prometheus, grafana, loki, alertmanager,
# keda) is NOT part of this chart — install those from upstream community charts.

imagePullPolicy: IfNotPresent

services:
  listener:
    image: agentic-apa/listener:dev
    replicas: 1
    ports:
      - name: alerts
        containerPort: 9000
    env:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      ALERTS_HTTP_PORT: "9000"

  orchestrator:
    image: agentic-apa/orchestrator:dev
    replicas: 1
    env:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      BROWSER_AGENT_URL: http://browser-agent:8080
      MONITOR_AGENT_URL: http://monitor-agent:8081

  browser-agent:
    image: agentic-apa/browser-agent:dev
    replicas: 1
    ports:
      - name: http
        containerPort: 8080
    env:
      PORT: "8080"
      HOST_OVERRIDE: browser-agent
      AGENT_NAME: browser-agent
      BROWSER_HEADLESS: "true"

  monitor-agent:
    image: agentic-apa/monitor-agent:dev
    replicas: 1
    ports:
      - name: http
        containerPort: 8081
    env:
      PORT: "8081"
      HOST_OVERRIDE: monitor-agent
      AGENT_NAME: monitor-agent
      GRAFANA_URL: http://grafana:3000
