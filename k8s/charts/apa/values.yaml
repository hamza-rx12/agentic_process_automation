# Default values for the apa chart.
# Infrastructure (postgres, prometheus, grafana, loki, alertmanager) is NOT
# part of this chart — install those from upstream community charts.

imagePullPolicy: IfNotPresent

postgres:
  secretName: apa-pg-app   # CNPG auto-generates this secret with key: uri

migrate:
  image: ghcr.io/hamza-rx12/apa-migrate:latest

reaper:
  schedule: "*/1 * * * *"
  stuckAfterMinutes: 15

services:
  listener:
    image: ghcr.io/hamza-rx12/apa-listener:latest
    replicas: 1
    ports:
      - name: alerts
        containerPort: 9000
    env:
      ALERTS_HTTP_PORT: "9000"

  orchestrator:
    image: ghcr.io/hamza-rx12/apa-orchestrator:latest
    replicas: 1
    env:
      BROWSER_AGENT_URL: http://browser-agent:8080
      MONITOR_AGENT_URL: http://monitor-agent:8081

  browser-agent:
    image: ghcr.io/hamza-rx12/apa-browser-agent:latest
    replicas: 1
    ports:
      - name: http
        containerPort: 8080
    env:
      PORT: "8080"
      HOST_OVERRIDE: browser-agent
      AGENT_NAME: browser-agent
      BROWSER_HEADLESS: "true"

  monitor-agent:
    image: ghcr.io/hamza-rx12/apa-monitor-agent:latest
    replicas: 1
    ports:
      - name: http
        containerPort: 8081
    env:
      PORT: "8081"
      HOST_OVERRIDE: monitor-agent
      AGENT_NAME: monitor-agent
      GRAFANA_URL: http://kube-prometheus-grafana:80
