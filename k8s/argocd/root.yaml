# Root "app-of-apps" — this Application watches k8s/argocd/apps/ and
# auto-creates every child Application it finds there.
# Bootstrap: kubectl apply -f k8s/argocd/root.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/hamza-rx12/agentic_process_automation.git
    targetRevision: master
    path: k8s/argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
